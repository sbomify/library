# SBOM workflow for R (Docker Official)
#
# Triggers when r-base config is updated.
# Extracts SBOM from Docker OCI attestation (SPDX).
# Also picked up by tea-sync hourly for image digest changes.
#
# https://hub.docker.com/_/r-base

name: "SBOM: r-base"

on:
  push:
    branches:
      - master
    paths:
      - 'apps/r-base/config.yaml'
      - '.github/workflows/sbom-r-base.yml'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no upload)'
        required: false
        type: boolean
        default: false

jobs:
  build:
    uses: ./.github/workflows/sbom-builder.yml
    with:
      app: r-base
      dry_run: ${{ github.event.inputs.dry_run == 'true' }}
    secrets: inherit
    permissions:
      id-token: write
      contents: read
      attestations: write
