# Reusable workflow for SBOM extraction and upload
name: SBOM Builder

on:
  workflow_call:
    inputs:
      app:
        description: 'App name (folder name under apps/)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (no upload to sbomify)'
        required: false
        type: boolean
        default: false
    secrets:
      SBOMIFY_TOKEN:
        required: false

env:
  YQ_VERSION: "v4.40.5"
  CRANE_VERSION: "v0.17.0"
  COSIGN_VERSION: "v2.2.2"

jobs:
  build:
    name: ${{ inputs.app }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # Required for OIDC token
      contents: read       # Required to read repository
      attestations: write  # Required to write attestations
    steps:
      - uses: actions/checkout@v4

      - name: Cache tools
        id: tool-cache
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/yq
            /usr/local/bin/crane
            /usr/local/bin/cosign
          key: tools-yq-${{ env.YQ_VERSION }}-crane-${{ env.CRANE_VERSION }}-cosign-${{ env.COSIGN_VERSION }}

      - name: Install tools
        if: steps.tool-cache.outputs.cache-hit != 'true'
        run: |
          # yq — download binary and checksums from release
          YQ_BASE="https://github.com/mikefarah/yq/releases/download/${{ env.YQ_VERSION }}"
          curl -fsSL -o /tmp/yq "${YQ_BASE}/yq_linux_amd64"
          curl -fsSL -o /tmp/yq_checksums "${YQ_BASE}/checksums-bsd"
          expected=$(grep 'SHA256 (yq_linux_amd64)' /tmp/yq_checksums | awk '{print $NF}')
          actual=$(sha256sum /tmp/yq | awk '{print $1}')
          echo "yq: expected=$expected actual=$actual"
          [[ "$expected" == "$actual" ]] || { echo "yq checksum mismatch"; exit 1; }
          sudo install /tmp/yq /usr/local/bin/yq

          # crane — download tarball and checksums from release
          CRANE_BASE="https://github.com/google/go-containerregistry/releases/download/${{ env.CRANE_VERSION }}"
          curl -fsSL -o /tmp/crane.tar.gz "${CRANE_BASE}/go-containerregistry_Linux_x86_64.tar.gz"
          curl -fsSL -o /tmp/crane_checksums.txt "${CRANE_BASE}/checksums.txt"
          checkline=$(grep go-containerregistry_Linux_x86_64.tar.gz /tmp/crane_checksums.txt)
          [[ -n "$checkline" ]] || { echo "crane checksum line not found"; exit 1; }
          echo "$checkline" | sed 's|go-containerregistry_Linux_x86_64.tar.gz|/tmp/crane.tar.gz|' \
            | sha256sum -c -
          tar -xzf /tmp/crane.tar.gz -C /tmp crane
          sudo install /tmp/crane /usr/local/bin/crane

          # cosign — download binary and checksums from release
          COSIGN_BASE="https://github.com/sigstore/cosign/releases/download/${{ env.COSIGN_VERSION }}"
          curl -fsSL -o /tmp/cosign "${COSIGN_BASE}/cosign-linux-amd64"
          curl -fsSL -o /tmp/cosign_checksums.txt "${COSIGN_BASE}/cosign_checksums.txt"
          checkline=$(grep 'cosign-linux-amd64$' /tmp/cosign_checksums.txt)
          [[ -n "$checkline" ]] || { echo "cosign checksum line not found"; exit 1; }
          echo "$checkline" | sed 's|cosign-linux-amd64|/tmp/cosign|' \
            | sha256sum -c -
          sudo install /tmp/cosign /usr/local/bin/cosign

      - name: Read config
        id: config
        run: |
          APP_DIR="apps/${{ inputs.app }}"
          CONFIG="${APP_DIR}/config.yaml"
          VERSION=$(yq -r '.version // ""' "$CONFIG" | tr -d '[:space:]')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "component_id=$(yq -r '.sbomify.component_id // ""' "$CONFIG")" >> $GITHUB_OUTPUT
          echo "component_name=$(yq -r '.sbomify.component_name // ""' "$CONFIG")" >> $GITHUB_OUTPUT
          echo "source_type=$(yq -r '.source.type // ""' "$CONFIG")" >> $GITHUB_OUTPUT
          echo "clone=$(yq -r '.source.clone // "false"' "$CONFIG")" >> $GITHUB_OUTPUT
          LOCKFILE_PATH=$(yq -r '.source.lockfile // ""' "$CONFIG")
          if [[ -n "$LOCKFILE_PATH" ]]; then
            echo "lockfile=$(basename "$LOCKFILE_PATH")" >> $GITHUB_OUTPUT
            # For cloned repos, lockfile is inside the repo/ directory
            CLONE=$(yq -r '.source.clone // "false"' "$CONFIG")
            if [[ "$CLONE" == "true" ]]; then
              echo "lockfile_path=repo/$LOCKFILE_PATH" >> $GITHUB_OUTPUT
            else
              echo "lockfile_path=$(basename "$LOCKFILE_PATH")" >> $GITHUB_OUTPUT
            fi
          else
            echo "lockfile=" >> $GITHUB_OUTPUT
            echo "lockfile_path=" >> $GITHUB_OUTPUT
          fi
          PRODUCT_ID=$(yq -r '.sbomify.product_id // ""' "$CONFIG")
          echo "product_id=${PRODUCT_ID}" >> $GITHUB_OUTPUT
          if [[ -n "$PRODUCT_ID" && -n "$VERSION" ]]; then
            echo "product_release=[\"${PRODUCT_ID}:${VERSION}\"]" >> $GITHUB_OUTPUT
          fi

          # Build PURL for TEA dedup lookup
          SOURCE_TYPE=$(yq -r '.source.type // ""' "$CONFIG")
          IMAGE=$(yq -r '.source.image // ""' "$CONFIG")
          REGISTRY=$(yq -r '.source.registry // ""' "$CONFIG")
          REPO=$(yq -r '.source.repo // ""' "$CONFIG")
          case "$SOURCE_TYPE" in
            docker)
              echo "purl=pkg:docker/${IMAGE}@${VERSION}" >> "$GITHUB_OUTPUT" ;;
            chainguard)
              echo "purl=pkg:oci/${REGISTRY}/${IMAGE}@${VERSION}" >> "$GITHUB_OUTPUT" ;;
            github_release|lockfile)
              echo "purl=pkg:github/${REPO}@${VERSION}" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "purl=" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Cache fetched SBOM
        id: sbom-cache
        if: steps.config.outputs.source_type == 'github_release'
        uses: actions/cache@v4
        with:
          path: sbom.json
          key: sbom-${{ inputs.app }}-${{ steps.config.outputs.version }}

      - name: Cache fetched lockfile
        id: lockfile-cache
        if: steps.config.outputs.source_type == 'lockfile'
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.config.outputs.lockfile_path }}
            repo/
          key: lockfile-${{ inputs.app }}-${{ steps.config.outputs.version }}

      - name: Cache Maven dependencies
        if: >-
          steps.config.outputs.source_type == 'lockfile' && steps.config.outputs.clone == 'true'
          && steps.lockfile-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ inputs.app }}-${{ steps.config.outputs.version }}
          restore-keys: |
            maven-${{ inputs.app }}-
            maven-

      # Always fetch for docker/chainguard (image digest may change without version bump).
      # Only skip for github_release/lockfile when cache hits.
      - name: Fetch SBOM or lockfile
        if: >-
          (steps.sbom-cache.outputs.cache-hit != 'true' && steps.config.outputs.source_type == 'github_release')
          || (steps.lockfile-cache.outputs.cache-hit != 'true' && steps.config.outputs.source_type == 'lockfile')
          || (steps.config.outputs.source_type != 'github_release' && steps.config.outputs.source_type != 'lockfile')
        run: ./scripts/fetch-sbom.sh "${{ inputs.app }}"

      - name: Read image digest
        id: digest
        if: >-
          steps.config.outputs.source_type == 'docker'
          || steps.config.outputs.source_type == 'chainguard'
        run: |
          if [[ ! -f image-digest.txt ]]; then
            echo "::error::image-digest.txt not found"
            exit 1
          fi
          digest=$(cat image-digest.txt)
          echo "image_digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "image_digest_safe=${digest//:/-}" >> "$GITHUB_OUTPUT"

      - name: Upload input artifact
        if: always() && hashFiles('sbom.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ inputs.app }}-${{ steps.digest.outputs.image_digest_safe || steps.config.outputs.version }}
          path: sbom.json

      - name: Upload lockfile artifact
        if: always() && steps.config.outputs.source_type == 'lockfile'
        uses: actions/upload-artifact@v4
        with:
          name: lockfile-${{ inputs.app }}-${{ steps.config.outputs.version }}
          path: ${{ steps.config.outputs.lockfile_path }}

      # Phase 1: Build augmented SBOM locally (no upload)
      - name: Build SBOM (from existing SBOM)
        if: steps.config.outputs.component_id != '' && steps.config.outputs.source_type != 'lockfile'
        uses: sbomify/sbomify-action@master
        env:
          TOKEN: ${{ secrets.SBOMIFY_TOKEN }}
          COMPONENT_ID: ${{ steps.config.outputs.component_id }}
          COMPONENT_NAME: ${{ steps.config.outputs.component_name }}
          COMPONENT_VERSION: ${{ steps.digest.outputs.image_digest || steps.config.outputs.version }}
          SBOM_FILE: sbom.json
          OUTPUT_FILE: sbom-output.json
          AUGMENT: true
          ENRICH: true
          UPLOAD: false

      - name: Build SBOM (from lockfile)
        if: steps.config.outputs.component_id != '' && steps.config.outputs.source_type == 'lockfile'
        uses: sbomify/sbomify-action@master
        env:
          TOKEN: ${{ secrets.SBOMIFY_TOKEN }}
          COMPONENT_ID: ${{ steps.config.outputs.component_id }}
          COMPONENT_NAME: ${{ steps.config.outputs.component_name }}
          COMPONENT_VERSION: ${{ steps.config.outputs.version }}
          LOCK_FILE: ${{ steps.config.outputs.lockfile_path }}
          OUTPUT_FILE: sbom-output.json
          AUGMENT: true
          ENRICH: true
          UPLOAD: false

      # Phase 2: Check if this version is already published via TEA PURL lookup
      - name: Install uv
        if: steps.config.outputs.component_id != '' && !inputs.dry_run
        uses: astral-sh/setup-uv@v4

      - name: Check TEA for existing version
        id: tea-check
        if: steps.config.outputs.component_id != '' && !inputs.dry_run
        run: |
          purl="${{ steps.config.outputs.purl }}"
          if [[ -z "$purl" ]]; then
            echo "No PURL available, will upload"
            echo "should_upload=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tei="urn:tei:purl:library.sbomify.com:${purl}"
          echo "TEI: $tei"

          result=$(uvx --from 'libtea[cli]' tea-cli inspect "$tei" --json 2>/dev/null || true)
          if [[ -z "$result" || "$result" == "{}" || "$result" == "null" ]]; then
            echo "Version not found on TEA, will upload"
            echo "should_upload=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version already published on TEA, skipping upload"
            echo "should_upload=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check sbomify for existing digest
        id: sbomify-check
        if: >-
          steps.config.outputs.component_id != '' && !inputs.dry_run
          && (steps.config.outputs.source_type == 'docker'
              || steps.config.outputs.source_type == 'chainguard')
          && steps.config.outputs.product_id != ''
        run: |
          source scripts/lib/common.sh
          source scripts/lib/sbomify-api.sh
          if sbomify_digest_exists \
              "${{ steps.config.outputs.product_id }}" \
              "${{ steps.config.outputs.version }}" \
              "${{ steps.config.outputs.component_id }}" \
              "${{ steps.digest.outputs.image_digest }}"; then
            echo "Digest already exists, skipping upload"
            echo "should_upload=false" >> "$GITHUB_OUTPUT"
          else
            echo "New digest, will upload"
            echo "should_upload=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          SBOMIFY_TOKEN: ${{ secrets.SBOMIFY_TOKEN }}

      - name: Resolve upload decision
        id: upload-decision
        if: steps.config.outputs.component_id != '' && !inputs.dry_run
        run: |
          src="${{ steps.config.outputs.source_type }}"
          if [[ "$src" == "docker" || "$src" == "chainguard" ]]; then
            echo "should_upload=${{ steps.sbomify-check.outputs.should_upload || 'true' }}" >> "$GITHUB_OUTPUT"
          else
            echo "should_upload=${{ steps.tea-check.outputs.should_upload || 'true' }}" >> "$GITHUB_OUTPUT"
          fi

      # Phase 3: Upload only if SBOM is new
      - name: Upload SBOM (from existing SBOM)
        if: >-
          steps.config.outputs.component_id != '' && steps.config.outputs.source_type != 'lockfile'
          && !inputs.dry_run && steps.upload-decision.outputs.should_upload == 'true'
        uses: sbomify/sbomify-action@master
        env:
          TOKEN: ${{ secrets.SBOMIFY_TOKEN }}
          COMPONENT_ID: ${{ steps.config.outputs.component_id }}
          COMPONENT_NAME: ${{ steps.config.outputs.component_name }}
          COMPONENT_VERSION: ${{ steps.digest.outputs.image_digest || steps.config.outputs.version }}
          SBOM_FILE: sbom-output.json
          OUTPUT_FILE: sbom-final.json
          UPLOAD: true
          PRODUCT_RELEASE: ${{ steps.config.outputs.product_release }}

      - name: Upload SBOM (from lockfile)
        if: >-
          steps.config.outputs.component_id != '' && steps.config.outputs.source_type == 'lockfile'
          && !inputs.dry_run && steps.upload-decision.outputs.should_upload == 'true'
        uses: sbomify/sbomify-action@master
        env:
          TOKEN: ${{ secrets.SBOMIFY_TOKEN }}
          COMPONENT_ID: ${{ steps.config.outputs.component_id }}
          COMPONENT_NAME: ${{ steps.config.outputs.component_name }}
          COMPONENT_VERSION: ${{ steps.config.outputs.version }}
          SBOM_FILE: sbom-output.json
          OUTPUT_FILE: sbom-final.json
          UPLOAD: true
          PRODUCT_RELEASE: ${{ steps.config.outputs.product_release }}

      - name: Cleanup old release artifacts
        if: >-
          steps.config.outputs.product_id != '' && !inputs.dry_run
          && steps.upload-decision.outputs.should_upload == 'true'
          && (steps.config.outputs.source_type == 'docker'
              || steps.config.outputs.source_type == 'chainguard')
        run: |
          source scripts/lib/common.sh
          source scripts/lib/sbomify-api.sh
          sbomify_cleanup_old_artifacts \
            "${{ steps.config.outputs.product_id }}" \
            "${{ steps.config.outputs.version }}" \
            "${{ steps.config.outputs.component_id }}" \
            "${{ steps.digest.outputs.image_digest }}"
        env:
          SBOMIFY_TOKEN: ${{ secrets.SBOMIFY_TOKEN }}

      - name: Upload output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-output-${{ inputs.app }}-${{ steps.config.outputs.version }}
          path: sbom-output.json

      - name: Attest SBOM provenance
        if: >-
          steps.config.outputs.component_id != '' && !inputs.dry_run
          && steps.upload-decision.outputs.should_upload == 'true'
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: sbom-output.json
