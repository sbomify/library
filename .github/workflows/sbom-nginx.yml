# SBOM workflow for Nginx (Chainguard)
#
# Triggers when nginx config is updated.
# Downloads SBOM from Chainguard cosign attestation (SPDX).
# Also picked up by tea-sync hourly for rolling digest changes.
#
# https://images.chainguard.dev/directory/image/nginx/overview

name: "SBOM: nginx"

on:
  push:
    branches:
      - master
    paths:
      - 'apps/nginx/config.yaml'
      - '.github/workflows/sbom-nginx.yml'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no upload)'
        required: false
        type: boolean
        default: false

jobs:
  build:
    uses: ./.github/workflows/sbom-builder.yml
    with:
      app: nginx
      dry_run: ${{ github.event.inputs.dry_run == 'true' }}
    secrets: inherit
    permissions:
      id-token: write
      contents: read
      attestations: write
