# TEA Sync - Rebuild SBOMs for docker/chainguard apps
#
# Runs hourly to detect when upstream images change without a version bump.
# Triggers the SBOM builder for all docker/chainguard apps. The builder
# itself handles deduplication via TEA hash lookup — if the augmented SBOM
# is already published, the upload is skipped.

name: TEA Sync

on:
  workflow_dispatch: {}

env:
  YQ_VERSION: "v4.40.5"

jobs:
  detect:
    name: Find docker/chainguard apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.find-apps.outputs.apps }}
      has_apps: ${{ steps.find-apps.outputs.has_apps }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          YQ_BASE="https://github.com/mikefarah/yq/releases/download/${{ env.YQ_VERSION }}"
          curl -fsSL -o /tmp/yq "${YQ_BASE}/yq_linux_amd64"
          curl -fsSL -o /tmp/yq_checksums "${YQ_BASE}/checksums-bsd"
          expected=$(grep 'SHA256 (yq_linux_amd64)' /tmp/yq_checksums | awk '{print $NF}')
          actual=$(sha256sum /tmp/yq | awk '{print $1}')
          [[ -n "$expected" ]] || { echo "yq checksum not found"; exit 1; }
          [[ "$expected" == "$actual" ]] || { echo "yq checksum mismatch"; exit 1; }
          sudo install /tmp/yq /usr/local/bin/yq

      - name: Find eligible apps
        id: find-apps
        run: |
          apps=()

          for config in apps/*/config.yaml; do
            app=$(basename "$(dirname "$config")")
            source_type=$(yq -r '.source.type // ""' "$config")

            if [[ "$source_type" == "docker" || "$source_type" == "chainguard" ]]; then
              echo "Found: $app ($source_type)"
              apps+=("$app")
            else
              echo "Skipping $app ($source_type)"
            fi
          done

          json=$(printf '%s\n' "${apps[@]}" | jq -R -s -c 'split("\n") | map(select(. != ""))')
          echo "Apps: $json"
          echo "apps=${json}" >> "$GITHUB_OUTPUT"

          if [[ ${#apps[@]} -eq 0 ]]; then
            echo "has_apps=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_apps=true" >> "$GITHUB_OUTPUT"
          fi

  sync:
    name: Sync ${{ matrix.app }}
    needs: detect
    if: needs.detect.outputs.has_apps == 'true'
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        app: ${{ fromJson(needs.detect.outputs.apps) }}
    uses: ./.github/workflows/sbom-builder.yml
    with:
      app: ${{ matrix.app }}
      dry_run: false
    secrets: inherit
    permissions:
      id-token: write
      contents: read
      attestations: write
