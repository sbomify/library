name: "SBOM: oraclelinux"

on:
  push:
    branches:
      - master
    paths:
      - 'apps/oraclelinux/config.yaml'
      - '.github/workflows/sbom-oraclelinux.yml'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no upload)'
        required: false
        type: boolean
        default: false

jobs:
  build:
    uses: ./.github/workflows/sbom-builder.yml
    with:
      app: oraclelinux
      dry_run: ${{ github.event.inputs.dry_run == 'true' }}
    secrets: inherit
    permissions:
      id-token: write
      contents: read
      attestations: write
