# SBOM workflow for Gradle (Docker Official)
#
# Triggers when gradle config is updated.
# Extracts SBOM from Docker OCI attestation (SPDX).
# Also picked up by tea-sync hourly for image digest changes.
#
# https://hub.docker.com/_/gradle

name: "SBOM: gradle"

on:
  push:
    branches:
      - master
    paths:
      - 'apps/gradle/config.yaml'
      - '.github/workflows/sbom-gradle.yml'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (no upload)'
        required: false
        type: boolean
        default: false

jobs:
  build:
    uses: ./.github/workflows/sbom-builder.yml
    with:
      app: gradle
      dry_run: ${{ github.event.inputs.dry_run == 'true' }}
    secrets: inherit
    permissions:
      id-token: write
      contents: read
      attestations: write
